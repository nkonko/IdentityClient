<div class="recover-container">
    <div class="recover-card">
      <mat-card>
        <mat-card-header>
          <mat-card-title>Forgot password?</mat-card-title>
          <mat-card-subtitle>We’ll email you a reset link</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <form (ngSubmit)="submit()" [formGroup]="form" class="auth-form">
            <!-- Email Input -->
            <div class="input-group">
              <label class="input-label">Email<span class="required">*</span></label>
              <div class="input-wrapper" [class.error]="form.get('email')?.invalid && form.get('email')?.touched">
                <span class="input-icon">
                  <mat-icon>mail</mat-icon>
                </span>
                <input
                  type="email"
                  formControlName="email"
                  placeholder="you@example.com">
              </div>
              @if (form.get('email')?.hasError('required') && form.get('email')?.touched) {
                <span class="input-error">Email is required</span>
              }
              @if (form.get('email')?.hasError('email') && form.get('email')?.touched) {
                <span class="input-error">Please enter a valid email</span>
              }
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary" [disabled]="form.invalid">
                Send reset link
              </button>
            </div>
            <div class="card-actions" style="margin-top: 12px; text-align: center;">
              <span>Remembered your password? </span>
              <a routerLink="/login">Back to Sign in</a>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
