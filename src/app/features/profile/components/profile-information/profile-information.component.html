<div class="profile-grid">
  <div class="profile-avatar-section">
    <app-profile-avatar
      [fullName]="form().get('name')?.value || user()?.name || ''"
      [imageUrl]="user()?.profilePictureUrl || null"
      (upload)="onFileSelected($event)"
      (delete)="onDeleteAvatar()">
    </app-profile-avatar>
  </div>

  <div class="profile-form-section">
    <form [formGroup]="form()" class="profile-form" (ngSubmit)="onSubmit()">
      <div class="form-fields">
        <app-text-input
          label="Full Name"
          name="name"
          autocomplete="name"
          icon="person"
          [required]="true"
          formControlName="name">
        </app-text-input>

        <app-text-input
          label="Email Address"
          type="email"
          name="email"
          autocomplete="email"
          icon="email"
          [required]="true"
          formControlName="email">
        </app-text-input>

        <app-text-input
          label="Position"
          name="position"
          autocomplete="organization-title"
          icon="work"
          placeholder="e.g. Senior Developer, Project Manager"
          formControlName="position">
        </app-text-input>

        <app-textarea
          label="Bio"
          name="bio"
          placeholder="Tell us a bit about yourself..."
          [rows]="4"
          formControlName="bio">
        </app-textarea>
      </div>
    </form>
  </div>
</div>
